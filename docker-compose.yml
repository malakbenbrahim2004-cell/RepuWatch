version: '3.8'

services:

  repuwatch-db:
    image: postgres:16-alpine
    container_name: repuwatch-db
    environment:
      POSTGRES_DB: repuwatch
      POSTGRES_USER: repuwatch_user
      POSTGRES_PASSWORD: repuwatch_pass
    volumes:
      - repuwatch_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repuwatch_user -d repuwatch"]
      interval: 10s
      timeout: 5s
      retries: 5


  repuwatch-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repuwatch-backend
    environment:
      DB_HOST: repuwatch-db
      DB_PORT: 5432
      DB_NAME: repuwatch
      DB_USER: repuwatch_user
      DB_PASSWORD: repuwatch_pass
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: malakbenbrahim2004@gmail.com
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      ALERT_RECIPIENT: malakbenbrahim2004@gmail.com
      ALERT_THRESHOLD: 40
    ports:
      - "8002:8000"
    depends_on:
      - repuwatch-db
    restart: unless-stopped

  repuwatch-tasks:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repuwatch-tasks
    command: python tasks.py
    environment:
      DB_HOST: repuwatch-db
      DB_PORT: "5432"
      DB_NAME: repuwatch
      DB_USER: repuwatch_user
      DB_PASSWORD: repuwatch_pass
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: malakbenbrahim2004@gmail.com
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      ALERT_RECIPIENT: malakbenbrahim2004@gmail.com
      ALERT_THRESHOLD: "40"
    depends_on:
      - repuwatch-db
    networks:
      - repuwatch-net
    restart: unless-stopped

  repuwatch-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8002
    container_name: repuwatch-frontend
    ports:
      - "3001:3000"
    depends_on:
      - repuwatch-backend
    restart: unless-stopped

volumes:
  repuwatch_pgdata:

networks:
  repuwatch-net:
    driver: bridge